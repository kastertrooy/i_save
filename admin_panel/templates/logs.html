{% extends "base.html" %}

{% block title %}Logs - INSTATG Admin Panel{% endblock %}

{% block content %}
<div x-data="logsPage()" x-init="init()" class="space-y-6">
    <div>
        <h1 class="text-3xl font-bold text-white">Logs</h1>
        <p class="text-gray-400 mt-1">Browse errors, notifications and delivery history with filters and pagination.</p>
    </div>

    <div class="flex flex-wrap gap-3">
        <button @click="setTab('errors')" :class="tab === 'errors' ? 'bg-blue-600' : 'bg-gray-700'" class="px-4 py-2 rounded text-white">Ошибки</button>
        <button @click="setTab('notifications')" :class="tab === 'notifications' ? 'bg-blue-600' : 'bg-gray-700'" class="px-4 py-2 rounded text-white">Уведомления</button>
        <button @click="setTab('deliveries')" :class="tab === 'deliveries' ? 'bg-blue-600' : 'bg-gray-700'" class="px-4 py-2 rounded text-white">Доставки</button>
    </div>

    <div class="card p-6 space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <template x-if="tab === 'errors'">
                <div class="contents">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Service</label>
                        <input type="text" x-model="filters.service"
                               class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded text-white focus:outline-none focus:border-blue-500" />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Level</label>
                        <select x-model="filters.level"
                                class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded text-white focus:outline-none focus:border-blue-500">
                            <option value="">All</option>
                            <option value="error">Error</option>
                            <option value="warn">Warn</option>
                            <option value="info">Info</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Days</label>
                        <input type="number" x-model.number="filters.days" min="1" max="365"
                               class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded text-white focus:outline-none focus:border-blue-500" />
                    </div>
                </div>
            </template>
            <template x-if="tab === 'notifications'">
                <div class="contents">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Type</label>
                        <input type="text" x-model="filters.notification_type"
                               class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded text-white focus:outline-none focus:border-blue-500" />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Status</label>
                        <select x-model="filters.status_filter"
                                class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded text-white focus:outline-none focus:border-blue-500">
                            <option value="">All</option>
                            <option value="sent">Sent</option>
                            <option value="failed">Failed</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Days</label>
                        <input type="number" x-model.number="filters.days" min="1" max="365"
                               class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded text-white focus:outline-none focus:border-blue-500" />
                    </div>
                </div>
            </template>
            <template x-if="tab === 'deliveries'">
                <div class="contents">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">User ID</label>
                        <input type="number" x-model.number="filters.user_id"
                               class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded text-white focus:outline-none focus:border-blue-500" />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Status</label>
                        <select x-model="filters.status_filter"
                                class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded text-white focus:outline-none focus:border-blue-500">
                            <option value="">All</option>
                            <option value="sent">Sent</option>
                            <option value="failed">Failed</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Days</label>
                        <input type="number" x-model.number="filters.days" min="1" max="365"
                               class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded text-white focus:outline-none focus:border-blue-500" />
                    </div>
                </div>
            </template>
        </div>

        <div class="flex justify-end">
            <button @click="loadLogs()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded">Apply Filters</button>
        </div>
    </div>

    <div class="card overflow-x-auto">
        <table class="w-full text-sm">
            <thead class="bg-gray-800 border-b border-gray-700">
                <tr>
                    <th class="text-left py-3 px-4 text-gray-300">#</th>
                    <template x-if="tab === 'errors'">
                        <th class="text-left py-3 px-4 text-gray-300">Service</th>
                        <th class="text-left py-3 px-4 text-gray-300">Level</th>
                        <th class="text-left py-3 px-4 text-gray-300">Days</th>
                        <th class="text-left py-3 px-4 text-gray-300">Details</th>
                    </template>
                    <template x-if="tab === 'notifications'">
                        <th class="text-left py-3 px-4 text-gray-300">Recipient</th>
                        <th class="text-left py-3 px-4 text-gray-300">Type</th>
                        <th class="text-left py-3 px-4 text-gray-300">Status</th>
                    </template>
                    <template x-if="tab === 'deliveries'">
                        <th class="text-left py-3 px-4 text-gray-300">User ID</th>
                        <th class="text-left py-3 px-4 text-gray-300">Delivery Type</th>
                        <th class="text-left py-3 px-4 text-gray-300">Status</th>
                    </template>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-700">
                <template x-for="log in logs" :key="log.id">
                    <tr class="hover:bg-gray-800/50">
                        <td class="py-3 px-4 text-gray-300" x-text="log.id"></td>
                        <template x-if="tab === 'errors'">
                            <td class="py-3 px-4 text-gray-300" x-text="log.service || filters.service || 'N/A'"></td>
                            <td class="py-3 px-4">
                                <span :class="log.level === 'error' ? 'text-red-400' : log.level === 'warn' ? 'text-yellow-400' : 'text-green-400'"
                                      x-text="log.level || filters.level || 'info'"></span>
                            </td>
                            <td class="py-3 px-4 text-gray-300" x-text="filters.days + 'd'"></td>
                            <td class="py-3 px-4 text-gray-400">Log entry placeholder</td>
                        </template>
                        <template x-if="tab === 'notifications'">
                            <td class="py-3 px-4 text-gray-300" x-text="log.recipient_type || 'N/A'"></td>
                            <td class="py-3 px-4 text-gray-300" x-text="log.notification_type || 'N/A'"></td>
                            <td class="py-3 px-4">
                                <span :class="log.status === 'failed' ? 'text-red-400' : 'text-green-400'" x-text="log.status"></span>
                            </td>
                        </template>
                        <template x-if="tab === 'deliveries'">
                            <td class="py-3 px-4 text-gray-300" x-text="log.user_id || 'N/A'"></td>
                            <td class="py-3 px-4 text-gray-300" x-text="log.delivery_type || 'N/A'"></td>
                            <td class="py-3 px-4">
                                <span :class="log.status === 'failed' ? 'text-red-400' : 'text-green-400'" x-text="log.status"></span>
                            </td>
                        </template>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>

    <div class="flex items-center justify-between text-gray-400">
        <div x-text="'Total: ' + total + ' entries'"></div>
        <div class="flex items-center gap-2">
            <button @click="prevPage()" :disabled="page === 1" class="px-3 py-1 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 text-white rounded">Previous</button>
            <span>Page <span x-text="page"></span></span>
            <button @click="nextPage()" class="px-3 py-1 bg-gray-700 hover:bg-gray-600 text-white rounded">Next</button>
        </div>
    </div>
</div>

<style>
    .card {
        background-color: #1f2937;
        border: 1px solid #374151;
        border-radius: 0.5rem;
    }
</style>

<script>
    function logsPage() {
        return {
            tab: 'errors',
            page: 1,
            limit: 25,
            total: 0,
            logs: [],
            filters: {
                service: '',
                level: '',
                days: 7,
                notification_type: '',
                status_filter: '',
                user_id: ''
            },

            init() {
                this.loadLogs();
            },

            setTab(tab) {
                this.tab = tab;
                this.page = 1;
                this.logs = [];
                this.loadLogs();
            },

            async loadLogs() {
                try {
                    const token = localStorage.getItem('access_token');
                    let url = '/logs/?';
                    if (this.tab === 'errors') {
                        url += new URLSearchParams({
                            service: this.filters.service || '',
                            level: this.filters.level || '',
                            days: String(this.filters.days || 7),
                            skip: String((this.page - 1) * this.limit),
                            limit: String(this.limit)
                        });
                    } else if (this.tab === 'notifications') {
                        url = '/logs/notifications?';
                        url += new URLSearchParams({
                            notification_type: this.filters.notification_type || '',
                            status_filter: this.filters.status_filter || '',
                            days: String(this.filters.days || 7),
                            skip: String((this.page - 1) * this.limit),
                            limit: String(this.limit)
                        });
                    } else {
                        url = '/logs/deliveries?';
                        url += new URLSearchParams({
                            user_id: this.filters.user_id ? String(this.filters.user_id) : '',
                            status_filter: this.filters.status_filter || '',
                            days: String(this.filters.days || 7),
                            skip: String((this.page - 1) * this.limit),
                            limit: String(this.limit)
                        });
                    }

                    const response = await fetch(url, {
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    if (!response.ok) throw new Error('Failed loading logs');
                    const data = await response.json();
                    this.logs = data.items || [];
                    this.total = data.total || 0;
                } catch (err) {
                    console.error('Failed to load logs', err);
                }
            },

            prevPage() {
                if (this.page > 1) {
                    this.page -= 1;
                    this.loadLogs();
                }
            },

            nextPage() {
                this.page += 1;
                this.loadLogs();
            }
        };
    }
</script>
{% endblock %}
