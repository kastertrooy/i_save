{% extends "base.html" %}

{% block title %}Instagram Accounts - INSTATG Admin Panel{% endblock %}

{% block content %}
<div x-data="accountsPage()" x-init="init()" class="space-y-6">
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-3xl font-bold text-white">Instagram Accounts</h1>
            <p class="text-gray-400 mt-1">Manage connected Instagram accounts, proxies and notification settings.</p>
        </div>
        <button @click="showCreate = true" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded">
            + Add Account
        </button>
    </div>

    <div class="card p-6 overflow-x-auto">
        <table class="w-full text-sm">
            <thead class="bg-gray-800 border-b border-gray-700">
                <tr>
                    <th class="text-left py-3 px-4 text-gray-300">Username</th>
                    <th class="text-left py-3 px-4 text-gray-300">Status</th>
                    <th class="text-left py-3 px-4 text-gray-300">Proxy ID</th>
                    <th class="text-left py-3 px-4 text-gray-300">Notify on Block</th>
                    <th class="text-left py-3 px-4 text-gray-300">Primary</th>
                    <th class="text-left py-3 px-4 text-gray-300">Actions</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-700">
                <template x-for="account in accounts" :key="account.id">
                    <tr class="hover:bg-gray-800/50">
                        <td class="py-3 px-4 font-semibold text-blue-300" x-text="account.username"></td>
                        <td class="py-3 px-4">
                            <span :class="account.status === 'active' ? 'text-green-400' : 'text-yellow-400'" x-text="account.status"></span>
                        </td>
                        <td class="py-3 px-4 text-gray-300" x-text="account.proxy_id || '—'"></td>
                        <td class="py-3 px-4">
                            <span :class="account.notify_users_on_block ? 'text-green-400' : 'text-gray-400'"
                                  x-text="account.notify_users_on_block ? 'Yes' : 'No'"></span>
                        </td>
                        <td class="py-3 px-4" x-text="account.is_primary ? 'Yes' : 'No'"></td>
                        <td class="py-3 px-4 space-x-2">
                            <button @click="openEdit(account)" class="px-2 py-1 bg-indigo-600 hover:bg-indigo-700 text-white text-xs rounded">Edit</button>
                            <button @click="assignProxy(account)" class="px-2 py-1 bg-yellow-600 hover:bg-yellow-700 text-white text-xs rounded">Proxy</button>
                            <button @click="toggleNotify(account)" :class="account.notify_users_on_block ? 'bg-green-600 hover:bg-green-700' : 'bg-gray-600 hover:bg-gray-500'" class="px-2 py-1 text-white text-xs rounded">
                                <span x-text="account.notify_users_on_block ? 'Disable Notify' : 'Enable Notify'"></span>
                            </button>
                            <button @click="deleteAccount(account.id)" class="px-2 py-1 bg-red-600 hover:bg-red-700 text-white text-xs rounded">Delete</button>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>

    <div x-show="showCreate || showEdit" class="fixed inset-0 bg-black/60 z-40 flex items-center justify-center p-4" x-cloak>
        <div class="bg-gray-900 rounded-xl w-full max-w-2xl p-6 border border-gray-700">
            <div class="flex items-center justify-between mb-4">
                <div>
                    <h2 class="text-xl font-bold text-white" x-text="showCreate ? 'Add Instagram Account' : 'Edit Instagram Account'"></h2>
                    <p class="text-sm text-gray-400" x-text="showCreate ? 'Create a new account entry.' : 'Update account credentials and proxy.'"></p>
                </div>
                <button @click="closeModal()" class="text-gray-400 hover:text-white">✕</button>
            </div>

            <form @submit.prevent="showCreate ? createAccount() : updateAccount()" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Login</label>
                        <input type="text" x-model="form.username" required
                               class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded text-white focus:outline-none focus:border-blue-500" />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                        <input type="password" x-model="form.password" required
                               class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded text-white focus:outline-none focus:border-blue-500" />
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Proxy ID</label>
                        <input type="number" x-model="form.proxy_id"
                               class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded text-white focus:outline-none focus:border-blue-500" />
                    </div>
                    <div class="flex items-center mt-6">
                        <input type="checkbox" x-model="form.is_primary" class="mr-2" />
                        <label class="text-gray-300">Primary account</label>
                    </div>
                </div>

                <div class="flex items-center space-x-4">
                    <label class="flex items-center space-x-2 text-gray-300">
                        <input type="checkbox" x-model="form.notify_users_on_block" class="form-checkbox h-4 w-4 text-blue-500" />
                        <span>Notify users on block</span>
                    </label>
                </div>

                <div class="flex justify-end gap-3">
                    <button type="button" @click="closeModal()" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-white rounded">Cancel</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded">
                        <span x-text="showCreate ? 'Create Account' : 'Save Changes'"></span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    .card {
        background-color: #1f2937;
        border: 1px solid #374151;
        border-radius: 0.5rem;
    }
</style>

<script>
    function accountsPage() {
        return {
            accounts: [],
            showCreate: false,
            showEdit: false,
            form: {
                id: null,
                username: '',
                password: '',
                proxy_id: null,
                is_primary: false,
                notify_users_on_block: false
            },

            async init() {
                await this.loadAccounts();
            },

            async loadAccounts() {
                try {
                    const token = localStorage.getItem('access_token');
                    const response = await fetch('/api/accounts/', {
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    if (response.status === 401) {
                        this.handleAuthError();
                        return;
                    }
                    if (response.ok) {
                        this.accounts = await response.json();
                    }
                } catch (err) {
                    console.error('Failed to load accounts', err);
                }
            },

            openEdit(account) {
                this.showEdit = true;
                this.showCreate = false;
                this.form = {
                    id: account.id,
                    username: account.username,
                    password: '',
                    proxy_id: account.proxy_id,
                    is_primary: account.is_primary,
                    notify_users_on_block: account.notify_users_on_block
                };
            },

            closeModal() {
                this.showCreate = false;
                this.showEdit = false;
                this.form = {
                    id: null,
                    username: '',
                    password: '',
                    proxy_id: null,
                    is_primary: false,
                    notify_users_on_block: false
                };
            },

            createAccount() {
                this.submitAccount('/api/accounts/', 'POST');
            },

            async updateAccount() {
                if (!this.form.id) return;
                await this.submitAccount(`/api/accounts/${this.form.id}`, 'PATCH');
            },

            async submitAccount(url, method) {
                try {
                    const token = localStorage.getItem('access_token');
                    const payload = {
                        username: this.form.username,
                        password: this.form.password,
                        proxy_id: this.form.proxy_id,
                        is_primary: this.form.is_primary
                    };
                    const response = await fetch(url, {
                        method,
                        headers: {
                            'Authorization': 'Bearer ' + token,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    });
                    if (response.status === 401) {
                        this.handleAuthError();
                        return;
                    }
                    if (!response.ok) {
                        const error = await response.json();
                        throw new Error(error.detail || 'Request failed');
                    }
                    await this.loadAccounts();
                    this.closeModal();
                } catch (err) {
                    alert('Error: ' + err.message);
                    console.error(err);
                }
            },

            handleAuthError() {
                localStorage.removeItem('access_token');
                alert('Session expired. Please sign in again.');
                window.location.href = '/login';
            },

            async deleteAccount(accountId) {
                if (!confirm('Delete account? This action cannot be undone.')) return;
                try {
                    const token = localStorage.getItem('access_token');
                    const response = await fetch(`/api/accounts/${accountId}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    if (response.ok) {
                        await this.loadAccounts();
                    }
                } catch (err) {
                    console.error('Delete failed', err);
                }
            },

            async assignProxy(account) {
                const proxyId = prompt('Enter proxy ID to assign to ' + account.username + ':', account.proxy_id || '');
                if (!proxyId) return;
                try {
                    const token = localStorage.getItem('access_token');
                    const response = await fetch(`/api/accounts/${account.id}/proxy?proxy_id=${proxyId}`, {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    if (response.ok) {
                        await this.loadAccounts();
                    }
                } catch (err) {
                    console.error('Proxy assign failed', err);
                }
            },

            async toggleNotify(account) {
                try {
                    const token = localStorage.getItem('access_token');
                    const response = await fetch(`/api/accounts/${account.id}/notify?notify=${!account.notify_users_on_block}`, {
                        method: 'PATCH',
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    if (response.ok) {
                        await this.loadAccounts();
                    }
                } catch (err) {
                    console.error('Toggle notify failed', err);
                }
            }
        };
    }
</script>
{% endblock %}
